name: Playwright E2E

on:
  push:
    branches: [main, master, 'claude/**']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      grep:
        description: 'Test tag filter (defaults to @northstar when omitted)'
        required: false
        default: ''
      project:
        description: 'Browser project to run: chromium | mobile-chrome | all (runs every project)'
        required: false
        default: 'all'

permissions:
  contents: read

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: automation/playwright

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install root app dependencies
        run: npm install --prefix ../..

      - name: Install Playwright browsers
        # mobile-chrome uses Pixel 5 emulation on Chromium — no additional binary needed.
        # Drop the explicit 'chromium' arg so adding Firefox/WebKit projects later
        # doesn't silently break this step.
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          GREP="${{ github.event.inputs.grep || '@northstar' }}"
          PROJECT="${{ github.event.inputs.project || 'all' }}"
          ARGS=""
          if [ -n "$GREP" ]; then
            ARGS="$ARGS --grep $GREP"
          fi
          # 'all' is a sentinel: omitting --project runs every project in playwright.config.js.
          # Both 'chromium' (Desktop Chrome) and 'mobile-chrome' (Pixel 5) run by default.
          if [ "$PROJECT" != "all" ]; then
            ARGS="$ARGS --project $PROJECT"
          fi
          npx playwright test $ARGS
        env:
          CI: true
          PLAYWRIGHT_PORT: '3100'
          BASE_URL: ${{ vars.BASE_URL || '' }}
          CHECKOUT_URL: ${{ vars.CHECKOUT_URL || 'https://www.saucedemo.com/' }}
          CHECKOUT_USER: ${{ secrets.CHECKOUT_USER || 'standard_user' }}
          CHECKOUT_PASSWORD: ${{ secrets.CHECKOUT_PASSWORD || 'secret_sauce' }}
          LANDING_URL: ${{ vars.LANDING_URL || '' }}
          SIGNUP_URL: ${{ vars.SIGNUP_URL || '' }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: reports/html/
          retention-days: 30

      - name: Upload raw evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-evidence-${{ github.run_id }}
          path: reports/raw/tmp/
          retention-days: 7
