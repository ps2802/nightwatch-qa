name: Client Intake
description: Capture a new audit request before scoping
labels: ["intake"]
title: "[Intake] <Client> – <Flow>"
body:
  - type: input
    id: client
    attributes:
      label: Client / Product
      placeholder: e.g., Typedream
    validations:
      required: true
  - type: input
    id: flow
    attributes:
      label: Flow type
      placeholder: Landing / Signup / Checkout / Other
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Metric or outcome
      placeholder: What does success look like?
    validations:
      required: true
  - type: textarea
    id: access
    attributes:
      label: Links, credentials, device notes
      placeholder: URLs, test accounts, special instructions
    validations:
      required: true
  - type: dropdown
    id: offer
    attributes:
      label: Offer tier
      options:
        - Spark Check
        - Nightwatch Core
        - Nightwatch Suite
        - Weekly Watch Retainer
    validations:
      required: true
  - type: input
    id: deadline
    attributes:
      label: Delivery deadline
      placeholder: 2026-03-13 08:00
    validations:
      required: true
  - type: dropdown
    id: payment
    attributes:
      label: Payment status
      options:
        - Pending
        - Paid
        - Net terms
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Extra context / hypotheses
    validations:
      required: false
